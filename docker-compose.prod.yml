# =============================================================================
# Stillwater · Yoga Studio — Production Docker Compose
# =============================================================================
#
# Production deployment configuration. Defines ONLY the `web` service.
#
# Stillwater is a stateless marketing site — the only persistent state is the
# SQLite database file (Lead model for form submissions). For production, the
# SQLite file is stored in a named volume (db_data) that survives container
# recreations.
#
# For higher-traffic deployments, migrate SQLite to Postgres by:
#   1. Change `provider` to "postgresql" in prisma/schema.prisma
#   2. Set DATABASE_URL to a postgresql:// URL
#   3. Add a `postgres` service (see the original yoga-studio docker-compose
#      for the pattern) or use a managed Postgres (Neon, Supabase, RDS)
#   4. Run `bunx prisma migrate deploy` instead of `prisma db push`
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f web
#   docker compose -f docker-compose.prod.yml down
#
# Env vars: mount .env (production values) via env_file.
# The only required var is DATABASE_URL — see .env.example.
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stillwater-web
    restart: unless-stopped
    ports:
      # Bind to loopback only — put a reverse proxy (Caddy, Nginx, Traefik)
      # in front for TLS termination. For a single-container deploy without
      # a reverse proxy, change to "3000:3000" to expose on all interfaces.
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # Named volume for the SQLite database — survives container recreation.
      # The Dockerfile creates /app/db with correct ownership; this volume
      # persists the file across `docker compose down` / `up`.
      - db_data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # NOTE: No other volumes needed — the app is stateless apart from the
    # SQLite file. The standalone build output is baked into the image.

# ==========================================================================
# Named Volumes
# ==========================================================================
volumes:
  db_data:
    driver: local
