# Local pre-commit gate. Install once per clone:
#
#   pip install pre-commit        # or: pipx install pre-commit
#   pre-commit install            # wire it into .git/hooks/pre-commit
#
# Thereafter every `git commit` scans the staged changes before they enter
# history. Bypass (discouraged) with `git commit --no-verify` — the CI job in
# .github/workflows/secret-scan.yml is the backstop for that case.
#
# Keep the gitleaks rev in sync with .github/workflows/secret-scan.yml.
# Update all hook versions with: pre-commit autoupdate

repos:
  # Secret scanning (API keys, tokens, private keys).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Detect secrets (gitleaks)

  # PII lint that gitleaks won't do: block machine-local absolute home paths
  # (e.g. /home/<user>/..., /Users/<user>/...) that leak a username / machine
  # layout. pygrep fails the commit if the pattern is found in staged files.
  - repo: local
    hooks:
      - id: no-local-home-paths
        name: Block machine-local absolute home paths
        language: pygrep
        entry: '/(?:home|Users)/[A-Za-z0-9._-]+/'
        types: [text]
        # The hook's own pattern definitions necessarily contain the pattern.
        exclude: '^(\.pre-commit-config\.yaml|\.github/workflows/secret-scan\.yml|README\.md)$'
