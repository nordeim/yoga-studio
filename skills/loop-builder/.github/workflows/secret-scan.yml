name: secret-scan

# Server-side backstop: even if a local commit skipped the pre-commit hook
# (--no-verify) or was made on a machine without it installed, this scans the
# pushed history and fails the build on any secret/PII hit.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit in the PR/push,
          # not just the tip.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks git --config .gitleaks.toml --redact --verbose

      - name: Block machine-local absolute home paths
        run: |
          # Mirrors the pygrep hook in .pre-commit-config.yaml. Scans tracked
          # files (not this workflow / hook config, which define the pattern).
          if git grep -nIE '/(home|Users)/[A-Za-z0-9._-]+/' -- \
               ':!.github/workflows/secret-scan.yml' \
               ':!.pre-commit-config.yaml' \
               ':!README.md'; then
            echo "::error::machine-local absolute home path found in a tracked file"
            exit 1
          fi
          echo "no machine-local home paths found"
