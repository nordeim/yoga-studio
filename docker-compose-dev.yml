# =============================================================================
# Stillwater · Yoga Studio — Development Docker Compose
# =============================================================================
#
# Single-service dev environment: Next.js web app with hot reload via Turbopack.
#
# Unlike the original yoga-studio repo (which needed PostgreSQL 17 + Redis 7),
# Stillwater uses SQLite (file-based) and in-memory rate limiting. No external
# database or cache services are required — the dev compose is just the web app.
#
# Usage:
#   docker compose -f docker-compose-dev.yml up -d
#   docker compose -f docker-compose-dev.yml logs -f web
#   docker compose -f docker-compose-dev.yml down
#
# First-run setup (after `up`):
#   docker compose -f docker-compose-dev.yml exec web bunx prisma db push
#   # Creates ./db/stillwater.db inside the container (persisted via volume)
# =============================================================================

services:
  # ==========================================================================
  # Next.js 16 Web Application (development with hot reload)
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: stillwater-web-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # SQLite file inside the container, persisted via the db_data volume.
      # The path is relative to /app (the WORKDIR in the Dockerfile).
      DATABASE_URL: "file:./db/stillwater.db"
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount the source for hot reload.
      - .:/app
      # Anonymous volume to keep the host's node_modules out of the container
      # (the container has its own bun-installed node_modules).
      - /app/node_modules
      # Preserve the Next.js build cache across restarts.
      - .next:/app/.next
      # Named volume for the SQLite database — survives container recreation.
      - db_data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # CMD is defined in Dockerfile.dev: `bun run dev -- --hostname 0.0.0.0`

# ==========================================================================
# Named Volumes
# ==========================================================================
volumes:
  db_data:
    driver: local
